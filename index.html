<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Fiscal Geral</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 20px; background-color: #f5f7fb; color: #333; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #dadce0; border-radius: 6px; }
        input[type="text"]:focus { border-color: #1a73e8; outline: none; }
        button { padding: 12px 25px; font-size: 16px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; max-height: 600px; border: 1px solid #dadce0; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #dadce0; padding: 12px; text-align: left; white-space: nowrap; }
        th { background-color: #f8f9fa; position: sticky; top: 0; z-index: 5; color: #3c4043; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .contador { font-size: 14px; color: #5f6368; font-weight: bold; margin-top: 10px; }
        .status-msg { padding: 12px; background: #e8f0fe; color: #1a73e8; border-radius: 6px; margin-bottom: 15px; font-weight: bold; }
        .loading-text { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status-msg">⏳ Carregando base de dados CSV... Aguarde.</div>

    <div class="search-box">
        <input type="text" id="termoBusca" placeholder="Digite nome, CPF, inscrição, bairro... e pressione Enter">
        <button id="btnEnviarBusca" onclick="executarBuscaCSV()">Buscar Tudo</button>
    </div>

    <div id="contador-resultados" class="contador"></div>
    
    <div class="table-wrapper">
        <table>
            <thead id="topo-tabela"></thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>
</div>

<script>
    let linhasCache = null;
    let cabecalhoCache = null;
    let separadorGlobal = ';'; 

    function removerAcentos(texto) {
        return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    // Função inteligente que testa qual formato decodifica melhor os acentos brutos
    function decodificarTexto(buffer) {
        const decodificadores = ['utf-8', 'windows-1252'];
        let textoFinal = "";
        
        for (let codificacao of decodificadores) {
            const decoder = new TextDecoder(codificacao);
            const textoTestado = decoder.decode(buffer);
            // Se não contiver caracteres corrompidos clássicos de conversão ANSI->UTF8, escolhe ele
            if (!textoTestado.includes('') || codificacao === 'windows-1252') {
                textoFinal = textoTestado;
                console.log("Codificação detectada: " + codificacao);
                break;
            }
        }
        return textoFinal;
    }

    async function carregarCSVPuro() {
        try {
            const res = await fetch('banco.csv');
            const buffer = await res.arrayBuffer();
            
            const texto = decodificarTexto(buffer);
            linhasCache = texto.split(/\r?\n/);
            
            if (linhasCache.length > 0) {
                const primeiraLinha = linhasCache[0];
                // Identifica automaticamente o separador correto
                if (primeiraLinha.indexOf(';') !== -1) separadorGlobal = ';';
                else if (primeiraLinha.indexOf(',') !== -1) separadorGlobal = ',';
                else if (primeiraLinha.indexOf('\t') !== -1) separadorGlobal = '\t';

                cabecalhoCache = primeiraLinha.split(separadorGlobal).map(c => c.replace(/"/g, '').trim());
            }

            document.getElementById('status').innerText = "✅ Banco de Dados CSV Pronto! Consultas liberadas.";
            document.getElementById('status').style.background = "#e6f4ea";
            document.getElementById('status').style.color = "#137333";
        } catch (err) {
            document.getElementById('status').innerText = "❌ Erro ao ler o arquivo banco.csv.";
            console.error(err);
        }
    }

    function executarBuscaCSV() {
        const termoOriginal = document.getElementById('termoBusca').value.trim();
        if (!termoOriginal || !linhasCache) return;
        
        const termoSemAcento = removerAcentos(termoOriginal);
        const tabelaElemento = document.getElementById('corpo-tabela');
        const topoElemento = document.getElementById('topo-tabela');
        const contador = document.getElementById('contador-resultados');
        
        tabelaElemento.innerHTML = '<tr><td colspan="100%" class="loading-text">🔍 Vasculhando banco de dados...</td></tr>';
        
        const correspondencias = [];
        
        for (let i = 1; i < linhasCache.length; i++) {
            const linhaBruta = linhasCache[i];
            if (!linhaBruta.trim()) continue;
            
            const linhaSemAcento = removerAcentos(linhaBruta);
            
            // Busca direta no texto bruto da linha para não falhar por causa de caracteres ocultos
            if (linhaSemAcento.indexOf(termoSemAcento) !== -1) {
